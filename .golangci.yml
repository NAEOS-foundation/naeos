version: "2"
linters:
  enable:
    - bodyclose
    - errorlint
    - gosec
    - misspell
    - noctx
    - unconvert
    - unparam
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gosec:
      excludes:
        - G104
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - gosec
          - errorlint
          - noctx
          - unparam
        path: _test\.go
      - linters:
          - errcheck
          - govet
          - ineffassign
          - staticcheck
          - unused
        path: zz_generated.*

      - linters:
          - gosec
          - staticcheck
          - govet
          - unparam
          - unused
        path: cmd/gentest/
      - linters:
          - gosec
          - staticcheck
          - govet
          - unparam
        path: cmd/neir-schema-gen/
      - linters:
          - gosec
          - govet
        path: cmd/naeos-demo/
      - linters:
          - unparam
        path: internal/broker/concurrency_test\.go
      - linters:
          - unused
        path: pkg/pipeline/pipeline_test\.go
      - linters:
          - unused
        path: cmd/naeos/cmd_test\.go
      - linters:
          - noctx
        path: internal/schemaregistry/client\.go
      - linters:
          - staticcheck
          - gosec
        path: internal/pluginsdk/scaffold/scaffold\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 10000
  max-same-issues: 10000
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/NAEOS-foundation/naeos
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
