name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Build
        run: go build ./cmd/naeos/
      - name: Test with race detector
        run: go test -race -count=1 -timeout 300s ./...
      - name: Vet
        run: go vet ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Generate coverage
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic -timeout 300s ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  supabase-integration:
    name: Supabase Integration
    runs-on: ubuntu-latest
    if: github.repository == 'NAEOS-foundation/naeos' && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Supabase integration tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: go test -run TestIntegration -count=1 -timeout 120s ./internal/supabase/...

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Fuzz parser
        run: go test -fuzz=^FuzzParse$ -fuzztime=30s ./internal/specification/parser/
      - name: Fuzz schema version
        run: go test -fuzz=FuzzSchemaVersionParse -fuzztime=30s ./internal/specification/parser/
      - name: Fuzz variable resolver
        run: go test -fuzz=FuzzVariableResolver -fuzztime=30s ./internal/specification/parser/
      - name: Fuzz validate modules
        run: go test -fuzz=FuzzValidateModules -fuzztime=30s ./internal/specification/parser/
      - name: Fuzz version parse
        run: go test -fuzz=FuzzParseVersion -fuzztime=30s ./internal/migration/
