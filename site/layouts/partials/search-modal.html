<div class="search-overlay" id="search-overlay" onclick="closeSearch()"></div>
<div class="search-modal" id="search-modal" role="dialog" aria-label="Search">
    <div class="search-input-wrapper">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="{{ i18n "search_placeholder" }}" autocomplete="off" spellcheck="false">
        <button class="search-close" onclick="closeSearch()" aria-label="Close search">✕</button>
    </div>
    <div class="search-results" id="search-results">
        <div class="search-hint">{{ i18n "search_hint" }}</div>
    </div>
</div>
